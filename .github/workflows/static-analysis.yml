name: "static analysis"

on:
    pull_request: ~
    push: ~
    workflow_dispatch: ~
    schedule:
        - cron: "* 10 5 * *"

jobs:
    static-analysis:
        name: "static analysis"
        runs-on: "ubuntu-latest"
        strategy:
            fail-fast: false
            matrix:
                php: ['8.4']
                symfony: ['7.3.*']
                composer-flags: ['--prefer-stable']

        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

        steps:
            - name: "checkout"
              uses: "actions/checkout@v4"

            - name: "set up docker cache"
              uses: actions/cache@v4
              with:
                path: .cache/docker
                key: ${{ runner.os }}-docker-php-${{ matrix.php }}-${{ hashFiles('**/compose.yaml') }}

            - name: "set up docker buildx"
              uses: docker/setup-buildx-action@v3

            - name: "build and cache the PHP environment"
              uses: docker/build-push-action@v6
              with:
                context: ./dev/docker
                build-args: |
                  PHP_VERSION=${{ matrix.php }}
                push: false
                load: true
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: "build the environment"
              run: "dev/bin/docker-compose -f compose.yaml -f compose.github.yaml build --build-arg PHP_VERSION=${{ matrix.php }} php"

            - name: "install dependencies"
              run: "dev/bin/php composer update --ansi ${{ matrix.composer-flags }}"

            - name: "run phpstan static analysis"
              run: "dev/bin/php phpstan --memory-limit=256M --ansi"

            - name: clear docker volumes
              if: ${{ always() }}
              run: dev/bin/docker-compose down --volumes
