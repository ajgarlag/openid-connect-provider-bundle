name: "static analysis"

on:
    pull_request: ~
    push: ~
    workflow_dispatch: ~
    schedule:
        # Do not make it the first of the month and/or midnight since it is a very busy time
        - cron: "* 10 5 * *"

jobs:
    static-analysis:
        name: "static analysis"
        runs-on: "ubuntu-latest"
        strategy:
            fail-fast: false
            matrix:
                php: ['8.4']
                symfony: ['7.3.*']
                composer-flags: ['--prefer-stable']

        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}

        steps:
            - name: "checkout"
              uses: "actions/checkout@v4"

            - name: "set up docker buildx"
              uses: docker/setup-buildx-action@v3

            - name: "build and push the PHP environment"
              uses: docker/build-push-action@v6
              with:
                context: .
                file: compose.yaml
                push: false
                build-args: |
                  PHP_VERSION=${{ matrix.php }}
                tags: user/php:${{ matrix.php }}
                cache-from: type=registry,ref=user/php:buildcache
                cache-to: type=registry,ref=user/php:buildcache,mode=max

            - name: "install dependencies"
              run: "dev/bin/php composer update --ansi ${{ matrix.composer-flags }}"

            - name: "run phpstan static analysis"
              run: "dev/bin/php phpstan --memory-limit=256M --ansi"

            - name: clear docker volumes
              if: ${{ always() }}
              run: dev/bin/docker-compose down --volumes
